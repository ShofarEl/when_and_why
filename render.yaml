services:
  - type: web
    name: insight-ai-backend
    env: node
    buildCommand: ""
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CLIENT_URL
        value: https://when-and-why.vercel.app
      - key: JWT_SECRET
        sync: false